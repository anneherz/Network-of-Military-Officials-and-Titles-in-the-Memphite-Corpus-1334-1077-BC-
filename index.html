<!DOCTYPE html>
<html lang="en" itemscope itemtype="https://schema.org/Map">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title>Military Officials and Titles in the Memphite Corpus, 1334–1077 BCE</title>
  <meta name="description" content="An interactive network of military officials and titles attested in the Memphite corpus, 1334–1077 BCE." />

  <!--[if IE]><script src="js/excanvas.js"></script><![endif]-->
  <script src="js/jquery/jquery.min.js"></script>
  <script src="js/sigma/sigma.min.js"></script>
  <script src="js/sigma/sigma.parseJson.js"></script>
  <script src="js/fancybox/jquery.fancybox.pack.js"></script>
  <script src="js/main.js"></script>

  <link rel="stylesheet" href="js/fancybox/jquery.fancybox.css" />
  <link rel="stylesheet" href="css/style.css" media="screen" />
  <link rel="stylesheet" href="css/tablet.css" media="screen and (max-width: 900px), screen and (max-height: 770px)" />
</head>
<body>
  <a class="skip-link" href="#mainpanel">Skip to controls</a>

  <main class="network-shell">
    <div class="sigma-parent" aria-label="Interactive network visualisation">
      <div class="sigma-expand" id="sigma-canvas"></div>
    </div>

    <section id="mainpanel" aria-label="Network controls">
      <div class="col">
        <header class="project-header">
          <p class="eyebrow">Interactive network</p>
          <h1>Military Officials and Titles</h1>
          <p class="project-subtitle">The Memphite Corpus, 1334–1077 BCE</p>
        </header>

        <!-- Kept for compatibility with the existing JavaScript/configuration. -->
        <div id="maintitle"></div>
        <div id="title"></div>
        <div id="titletext"></div>

        <div class="info cf">
          <dl>
            <dt class="moreinformation" aria-hidden="true"></dt>
            <dd class="line"><a href="#information" class="line fb">About this visualisation</a></dd>
          </dl>
        </div>

        <div id="legend" class="panel-section">
          <div class="box">
            <h2>Legend</h2>
            <dl>
              <dt class="node" aria-hidden="true"></dt><dd></dd>
              <dt class="edge" aria-hidden="true"></dt><dd></dd>
              <dt class="colours" aria-hidden="true"></dt><dd></dd>
            </dl>
          </div>
        </div>

        <div class="b1">
          <form autocomplete="off">
            <div id="search" class="cf panel-section">
              <h2>Search</h2>
              <div class="field-wrap">
                <input type="text" name="search" value="Search by name" class="empty" aria-label="Search by name" />
                <div class="state" aria-hidden="true"></div>
              </div>
              <div class="results" aria-live="polite"></div>
            </div>

            <div class="cf panel-section" id="attributeselect">
              <h2>Filter by group</h2>
              <div class="select" role="button" tabindex="0" aria-haspopup="listbox">Select group</div>
              <div class="list cf" role="listbox"></div>
            </div>
          </form>
        </div>
      </div>
      <div id="information"></div>
    </section>

    <nav id="zoom" aria-label="Network zoom controls">
      <button class="z" rel="in" type="button" aria-label="Zoom in"></button>
      <button class="z" rel="out" type="button" aria-label="Zoom out"></button>
      <button class="z" rel="center" type="button" aria-label="Reset view"></button>
    </nav>

    <div id="copyright">
      <a rel="license" href="https://creativecommons.org/licenses/by-nc-sa/3.0/" aria-label="Creative Commons BY-NC-SA 3.0 licence">
        <img alt="Creative Commons licence" src="images/CC.png" />
      </a>
    </div>

    <aside id="attributepane" aria-label="Selected network item">
      <div class="text">
        <div title="Close" class="left-close returntext" role="button" tabindex="0">
          <div class="c cf"><span>Return to the full network</span></div>
        </div>
        <div class="headertext"><span>Selected item</span></div>
        <div class="nodeattributes">
          <div class="name"></div>
          <div class="data"></div>
          <div class="p">Connections</div>
          <div class="link"><ul></ul></div>
        </div>
      </div>
    </aside>

    <footer id="developercontainer">
      <a href="https://www.oii.ox.ac.uk" title="Oxford Internet Institute"><div id="oii"><span>OII</span></div></a>
      <a href="https://jisc.ac.uk" title="Jisc"><div id="jisc"><span>Jisc</span></div></a>
    </footer>
  </main>
</body>
</html>
